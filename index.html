    }

      border-color: rgba(74, 127, 167, 0.45);
    }

    body.dark .logoutbtn {

      color: #B3CFE5;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #1A3D63;
      color: #B3CFE5;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s, color 0.2s;
    }

    .tab.active {
      background: #4A7FA7;
      color: #F6FAFD;
    }

    .section {
      display: none;
    }

    .section.show {
      display: block;
    }

      display: grid;

      gap: 10px;

    .stat {

  <!-- ===== FIREBASE AUTH MODULE ===== -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      deleteDoc,
      onSnapshot,
      getDoc,
      setDoc as fsSetDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBg3JLnLSiHH4vQqNRTdfl7TAXkGDxR6Ts",
      authDomain: "checador-sh.firebaseapp.com",
      projectId: "checador-sh",
      storageBucket: "checador-sh.appspot.com",
      messagingSenderId: "1074509664672",
      appId: "1:1074509664672:web:6248902b297aa7709754c5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let unsubscribeListener = null;

    // ---- Auth ----
    window.registrar = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Usuario creado");
      } catch (e) {
        alert(e.message);
      }
    };

    window.login = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        alert(e.message);
      }
    };

    window.logout = async () => {
      if (unsubscribeListener) unsubscribeListener();
      await signOut(auth);
    };

    // ---- Firestore helpers exposed globally ----

    // Guardar un registro en Firestore (ID = fecha YYYY-MM-DD)
    window.fsGuardarRegistro = async (uid, reg) => {
      setSyncStatus("syncing");
      try {
        const docId = reg._id || reg.fecha; // Soporte para formato nuevo o viejo
        const ref = doc(db, "usuarios", uid, "registros", docId);
        await setDoc(ref, reg);
        setSyncStatus("synced");
        return true;
      } catch (e) {
        console.error("Error guardando:", e);
        setSyncStatus("error", e.message);
        return false;
      }
    };

    // Eliminar un registro por fecha
    window.fsEliminarRegistro = async (uid, fecha) => {
      setSyncStatus("syncing");
      try {
        await deleteDoc(doc(db, "usuarios", uid, "registros", fecha));
        setSyncStatus("synced");
      } catch (e) {
        setSyncStatus("error", e.message);
      }
    };

    // Borrar lista de registros por fecha
    window.fsBorrarTodo = async (uid, fechas) => {
      setSyncStatus("syncing");
      try {
        await Promise.all(fechas.map(f =>
          deleteDoc(doc(db, "usuarios", uid, "registros", f))
        ));
        setSyncStatus("synced");
      } catch (e) {
        setSyncStatus("error", e.message);
      }
    };

    // Guardar config (pagoHora)
    window.fsGuardarConfig = async (uid, pagoHora) => {
      try {
        await setDoc(doc(db, "usuarios", uid, "config", "general"), { pagoHora });
      } catch(e) { console.error(e); }
    };

    // ---- Auth state ----
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window._uid = user.uid;

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";

        // Cargar config
        try {
          const cfgDoc = await getDoc(doc(db, "usuarios", user.uid, "config", "general"));
          if (cfgDoc.exists()) {
            const cfg = cfgDoc.data();
            window._pagoHora = cfg.pagoHora || 60;
            document.getElementById("horaPago").value = window._pagoHora;
          }
        } catch(e) {}

        // Escuchar registros en tiempo real
        if (unsubscribeListener) unsubscribeListener();
        setSyncStatus("syncing");

        unsubscribeListener = onSnapshot(
          collection(db, "usuarios", user.uid, "registros"),
          (snapshot) => {
            window.registros = [];
            snapshot.forEach(docSnap => {
              // Guardamos el ID del documento para distinguir formato nuevo (fecha) vs viejo (nombre día)
              window.registros.push({ ...docSnap.data(), _id: docSnap.id });
            });
            // Ordenar por fecha
            window.registros.sort((a, b) => a.fecha > b.fecha ? 1 : -1);
            setSyncStatus("synced");
            if (document.getElementById("semana").classList.contains("show")) renderSemana();
            if (document.getElementById("historial").classList.contains("show")) renderHistorial();
          },
          (error) => {
            setSyncStatus("error", "Sin conexión");
          }
        );

      } else {
        window._uid = null;
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("app").style.display = "none";
      }
    });

    function setSyncStatus(state, msg) {
      const el = document.getElementById("syncStatus");
      if (!el) return;
      el.className = "";
      if (state === "synced") {
        el.textContent = "☁️ Guardado en la nube";
        el.classList.add("synced");
      } else if (state === "syncing") {
        el.textContent = "⏳ Sincronizando...";
        el.classList.add("syncing");
      } else {
        el.textContent = "⚠️ Error: " + (msg || "Sin conexión");
        el.classList.add("error");
      }
    }

  </script>

  <!-- ===== APP LOGIC ===== -->
  <script>

    window.registros = [];
    window._pagoHora = 60;

    function getUID() { return window._uid; }
    function getPagoHora() {
      return parseFloat(document.getElementById("horaPago").value) || 60;
    }

    document.getElementById("fecha").value = new Date().toISOString().split('T')[0];

    if (localStorage.getItem("dark") === "true") {
      document.body.classList.add("dark");
    }

    // ===== UTILIDADES DE SEMANA =====

    function getLunesDeEstaSemana() {
      const now = new Date();
      const day = now.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      const monday = new Date(now);
      monday.setDate(now.getDate() + diff);
      monday.setHours(0, 0, 0, 0);
      return monday;
    }

    function getFechasDeEstaSemana() {
      const lunes = getLunesDeEstaSemana();
      const set = new Set();
      for (let i = 0; i < 7; i++) {
        const d = new Date(lunes);
        d.setDate(lunes.getDate() + i);
        set.add(d.toISOString().split('T')[0]);
      }
      return set;
    }

    function getLunesDeFecha(fechaStr) {
      const d = new Date(fechaStr + 'T12:00:00');
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      const monday = new Date(d);
      monday.setDate(d.getDate() + diff);
      return monday.toISOString().split('T')[0];
    }

    function getLabelSemana(lunesStr) {
      const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      const d = new Date(lunesStr + 'T12:00:00');
      const domingo = new Date(d);
      domingo.setDate(d.getDate() + 6);
      return `Semana ${d.getDate()} ${meses[d.getMonth()]} — ${domingo.getDate()} ${meses[domingo.getMonth()]} ${domingo.getFullYear()}`;
    }

    // ===== NAVEGACIÓN =====

    function showTab(tab, e) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".section").forEach(s => s.classList.remove("show"));
      e.target.classList.add("active");
      document.getElementById(tab).classList.add("show");
      if (tab === "semana") renderSemana();
      if (tab === "historial") renderHistorial();
    }

    // ===== GUARDAR DÍA =====

    async function guardarDia() {
      const uid = getUID();
      if (!uid) { alert("No hay sesión activa"); return; }

      const idDoc = document.getElementById("idDoc").value;
      const dia = document.getElementById("dia").value;
      const fecha = document.getElementById("fecha").value;
      const entrada = document.getElementById("entrada").value;
      const salida = document.getElementById("salida").value;
      const comida = parseInt(document.getElementById("comida").value) || 0;
      const prestamo = parseFloat(document.getElementById("prestamo").value) || 0;

      let min = 0;
      if (entrada && salida) {
        const [eh, em] = entrada.split(":").map(Number);
        const [sh, sm] = salida.split(":").map(Number);
        min = ((sh * 60) + sm) - ((eh * 60) + em) - comida;
        if (min < 0) { alert("Horario inválido"); return; }
      }

      // reg._id se utiliza como el ID del documento en Firestore
      const docIdFinal = idDoc || fecha;
      const reg = { _id: docIdFinal, dia, fecha, entrada, salida, comida, prestamo, min };
      const ok = await window.fsGuardarRegistro(uid, reg);

      if (ok) {
        document.getElementById("ok").style.display = "block";
        setTimeout(() => {
          document.getElementById("ok").style.display = "none";
          document.getElementById("modo-salida").style.display = "none";
          document.getElementById("modo-entrada").style.display = "block";
          document.querySelectorAll(".tab")[1].click();
        }, 1000);
      }
    }

    function fmtHoras(min) {
      const h = Math.floor(min / 60);
      const m = min % 60;
      return `${h}h ${m}min`;
    }

    // ===== RENDER DÍA ACTUAL =====

    function renderSemana() {
      const pagoHora = getPagoHora();
      const fechaAct = new Date().toISOString().split('T')[0];
      const registros = (window.registros || []).filter(r =>
        r.fecha === fechaAct
      );

      let totalMin = 0, totalPrestamo = 0;
      registros.forEach(r => { totalMin += (r.min||0); totalPrestamo += (r.prestamo||0); });

      const horas = totalMin / 60;
      const extras = Math.max(horas - 48, 0);
      const normales = Math.min(horas, 48);
      const total = (normales * pagoHora) + (extras * (pagoHora * 2));
      const neto = total - totalPrestamo;

      let html = `
      <div class="statgrid">
        <div class="stat"><h2>${fmtHoras(totalMin)}</h2><p>Horas</p></div>
        <div class="stat"><h2>${extras.toFixed(1)}h</h2><p>Extras</p></div>
        <div class="stat"><h2>$${Math.round(total)}</h2><p>Total</p></div>
        <div class="stat"><h2>$${Math.round(neto)}</h2><p>Neto</p></div>
      </div>
      <div class="card">`;

      if (registros.length === 0) {
        html += `<p style="color:var(--text2); text-align:center; padding:20px;">Sin registros esta semana</p>`;
      }

      registros.forEach(r => {
        const pago = Math.round(((r.min||0) / 60) * pagoHora);
        const cerrado = !!r.salida;
        html += `
        <div class="day">
          <div>
            <div class="dayname">${r.dia}
              ${cerrado
                ? '<span class="badge-cerrado">🔒 Cerrado</span>'
                : '<span class="badge-pendiente">⏳ Pendiente</span>'}
            </div>
            <div class="dayinfo">📅 ${r.fecha}</div>
            <div class="dayinfo">${r.entrada||'--:--'} → ${r.salida||'Sin salida'}</div>
            <div class="dayinfo">Trabajado: ${fmtHoras(r.min||0)}</div>
            <div class="dayinfo">Comida: ${r.comida}min${r.prestamo>0?' · Préstamo: $'+r.prestamo:''}</div>
          </div>
          <div style="text-align:right;">
            <div class="dayname" style="margin-bottom:5px;">$${pago}</div>
            ${!cerrado ? `<button class="smallbtn" style="background:#0a633e; margin-bottom:5px; display:block; width:100%;"
              onclick="prepararSalida('${r._id}')">Registrar Salida</button>` : ''}
            <button class="smallbtn" style="display:block; width:100%;"
              onclick="eliminarDia('${r._id}','${r.dia}')">Eliminar</button>
          </div>
        </div>`;
      });

      html += `</div>
        <button class="btn whatsapp" onclick="compartirWA()">Compartir WhatsApp (Hoy)</button>
        <button class="btn pdf" onclick="exportPDF()">Exportar PDF (Hoy)</button>
        <button class="btn deletebtn" onclick="borrarTodo()">Borrar Todos los de Hoy</button>`;

      document.getElementById("contenidoSemana").innerHTML = html;
    }

    // ===== RENDER HISTORIAL =====

    function renderHistorial(searchQuery = '') {
      const pagoHora = getPagoHora();
      const fechaAct = new Date().toISOString().split('T')[0];
      
      // Todo lo que no sea de hoy se va al historial
      let historicos = (window.registros || []).filter(r => r.fecha && r.fecha !== fechaAct);

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        historicos = historicos.filter(r => 
          (r.dia && r.dia.toLowerCase().includes(q)) || 
          (r.fecha && r.fecha.includes(q))
        );
      }

      if (historicos.length === 0) {
        document.getElementById('contenidoHistorial').innerHTML =
          `<div class="card" style="text-align:center; padding:30px; margin-bottom:20px;">
            <p style="color:var(--text2); font-size:15px;">📋 No hay registros para mostrar</p>
          </div>`;
        return;
      }

      const semanas = {};
      historicos.forEach(r => {
        const lunes = getLunesDeFecha(r.fecha);
        if (!semanas[lunes]) semanas[lunes] = [];
        semanas[lunes].push(r);
      });

      const lunesKeys = Object.keys(semanas).sort().reverse();
      let html = '';

      lunesKeys.forEach(lunesStr => {
        const regs = semanas[lunesStr].sort((a, b) => a.fecha > b.fecha ? 1 : -1);
        let totalMin = 0, totalPrestamo = 0;
        regs.forEach(r => { totalMin += (r.min||0); totalPrestamo += (r.prestamo||0); });
        const horas = totalMin / 60;
        const extras = Math.max(horas - 48, 0);
        const normales = Math.min(horas, 48);
        const total = (normales * pagoHora) + (extras * (pagoHora * 2));
        const neto = total - totalPrestamo;

        html += `<div class="hist-semana">
          <div class="hist-titulo">📅 ${getLabelSemana(lunesStr)}</div>
          <div class="statgrid" style="margin-bottom:10px;">
            <div class="stat"><h2>${fmtHoras(totalMin)}</h2><p>Horas</p></div>
            <div class="stat"><h2>$${Math.round(neto)}</h2><p>Neto</p></div>
          </div>
          <div class="card" style="margin-bottom:10px;">`;

        regs.forEach(r => {
          const pago = Math.round(((r.min||0) / 60) * pagoHora);
          html += `
          <div class="day">
            <div>
              <div class="dayname">${r.dia} <span class="badge-cerrado">🔒 Histórico</span></div>
              <div class="dayinfo">📅 ${r.fecha}</div>
              <div class="dayinfo">${r.entrada||'--:--'} → ${r.salida||'Sin salida'}</div>
              <div class="dayinfo">Trabajado: ${fmtHoras(r.min||0)}</div>
            </div>
            <div style="text-align:right;">
              <div class="dayname">$${pago}</div>
            </div>
          </div>`;
        });

        html += `</div></div>`;
      });

      document.getElementById('contenidoHistorial').innerHTML = html;
    }

    // ===== COMPARTIR / EXPORTAR (solo hoy) =====

    function compartirWA() {
      const pagoHora = getPagoHora();
      const fechaAct = new Date().toISOString().split('T')[0];
      const registros = (window.registros || []).filter(r => r.fecha === fechaAct);
      let totalMin = 0, totalPrestamo = 0, txt = '';
      txt += `*Registro del Día (${fechaAct})*\n_Pago por hora: $${pagoHora}_\n\n`;
      registros.forEach(r => {
        totalMin += (r.min||0); totalPrestamo += (r.prestamo||0);
        const pago = Math.round(((r.min||0) / 60) * pagoHora);
        txt += `*${r.dia}* — ${r.entrada||'--:--'} a ${r.salida||'Pendiente'}\n`;
        txt += `Fecha: ${r.fecha}\nTrabajado: ${fmtHoras(r.min||0)} → $${pago}\nComida: ${r.comida}min\n\n---\n\n`;
      });
      const horas = totalMin / 60;
      const extras = Math.max(horas - 48, 0);
      const normales = Math.min(horas, 48);
      const total = (normales * pagoHora) + (extras * (pagoHora * 2));
      const neto = total - totalPrestamo;
      txt += `*Total horas:* ${fmtHoras(totalMin)}\n*Total a cobrar:* $${Math.round(total)}\n*Total prestado:* $${Math.round(totalPrestamo)}\n*Neto a recibir:* $${Math.round(neto)}`;
      window.open("https://wa.me/?text=" + encodeURIComponent(txt), "_blank");
    }

    async function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const fechaAct = new Date().toISOString().split('T')[0];
      const registros = (window.registros || []).filter(r => r.fecha === fechaAct);
      let y = 20;
      doc.setFontSize(18); doc.text(`Checador SH — ${fechaAct}`, 20, y); y += 14;
      registros.forEach(r => {
        doc.setFontSize(12);
        doc.text(`${r.dia} ${r.fecha}`, 20, y); y += 7;
        doc.text(`${r.entrada||'--:--'} a ${r.salida||'Pendiente'} — ${fmtHoras(r.min||0)}`, 20, y); y += 12;
      });
      doc.save("registro.pdf");
    }

    // ===== CHECAR ENTRADA =====

    function checarEntrada() {
      const now = new Date();
      const days = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
      const diaAct = days[now.getDay()];
      const fechaAct = now.toISOString().split('T')[0];

      // Verificamos si existe un turno ABIERTO para la fecha actual
      const turnoAbierto = (window.registros || []).find(r => r.fecha === fechaAct && !r.salida);

      if (turnoAbierto) {
        alert("⚠️ Ya tienes un turno abierto hoy. Usa 'Registrar Salida' en la pestaña Semana.");
        return;
      }

      // Creamos un ID único para el documento de este turno
      const nuevoId = `${fechaAct}_${Date.now()}`;
      document.getElementById("idDoc").value = nuevoId;
      document.getElementById("dia").value = diaAct;
      document.getElementById("fecha").value = fechaAct;
      const hs = String(now.getHours()).padStart(2, '0');
      const ms = String(now.getMinutes()).padStart(2, '0');
      document.getElementById("entrada").value = `${hs}:${ms}`;
      document.getElementById("salida").value = "";
      document.getElementById("comida").value = "0";
      document.getElementById("prestamo").value = "0";
      guardarDia();
    }

    // ===== PREPARAR SALIDA (usa fecha como ID) =====

    function prepararSalida(fechaStr) {
      // Buscar SOLO por _id (formato nuevo: _id === fecha YYYY-MM-DD)
      const reg = (window.registros || []).find(r => r._id === fechaStr);
      if (!reg) return;
      if (reg.salida) { alert("🔒 Este turno ya fue cerrado. No se puede modificar."); return; }
      document.getElementById("idDoc").value = reg._id || reg.fecha;
      document.getElementById("dia").value = reg.dia;
      document.getElementById("fecha").value = reg.fecha;
      document.getElementById("entrada").value = reg.entrada;
      document.getElementById("comida").value = reg.comida;
      document.getElementById("prestamo").value = reg.prestamo;
      const now = new Date();
      const hs = String(now.getHours()).padStart(2, '0');
      const ms = String(now.getMinutes()).padStart(2, '0');
      document.getElementById("salida").value = `${hs}:${ms}`;
      document.getElementById("modo-entrada").style.display = "none";
      document.getElementById("modo-salida").style.display = "block";
      document.querySelectorAll(".tab")[0].click();
    }

    function cancelarSalida() {
      document.getElementById("modo-entrada").style.display = "block";
      document.getElementById("modo-salida").style.display = "none";
      document.querySelectorAll(".tab")[1].click();
    }

    // ===== ELIMINAR CON CONFIRMACIÓN =====

    async function eliminarDia(idDoc, dia) {
      const uid = getUID();
      if (!uid) return;
      if (!confirm(`⚠️ ¿Eliminar este registro del ${dia}?\nEsta acción no se puede deshacer.`)) return;
      await window.fsEliminarRegistro(uid, idDoc);
      renderSemana();
    }

    async function borrarTodo() {
      const uid = getUID();
      if (!uid) return;
      const fechaAct = new Date().toISOString().split('T')[0];
      const idsBorrar = (window.registros || [])
        .filter(r => r.fecha === fechaAct)
        .map(r => r._id || r.fecha);
      if (idsBorrar.length === 0) { alert("No hay registros el día de hoy."); return; }
      if (!confirm(`⚠️ ¿Borrar todos los ${idsBorrar.length} registro(s) de hoy?\nEsta acción no se puede deshacer.`)) return;
      await window.fsBorrarTodo(uid, idsBorrar);
      renderSemana();
    }

    async function guardarConfig() {
      const uid = getUID();
      const pagoHora = getPagoHora();
      window._pagoHora = pagoHora;
      if (uid) await window.fsGuardarConfig(uid, pagoHora);
      alert("Configuración guardada ✅");
    }

    function toggleDark() {
      document.body.classList.toggle("dark");
      localStorage.setItem("dark", document.body.classList.contains("dark"));
    }

  </script>
