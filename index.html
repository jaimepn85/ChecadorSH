<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checador Pro</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --primary: #781281;
      --bg: #acb9bf;
      --card:#acb9bf;
      --text:#7b3b4b;
      --text2:#7b3b4b;
      --border: #7b3b4b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      padding: 20px;
    }

    body.dark {
      --bg:#7b3b4b;
      --card:#7b3b4b;
      --text:#acb9bf;
      --text2: #acb9bf;
      --border: #ece6e6;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: var(--card);
      border: 5px solid var(--border);
      border-radius: 20px;
      padding:16px;
      margin-bottom: 100px;
    }

    h1 {
      color: var(--text);
      margin-bottom: 5px;
    }

    .sub {
      color: var(--text2);
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 12px 0 5px;
      color: var(--text2);
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .primary {
      background: #f5e7d5;
      color: #212844;
    }

    .whatsapp {
      background: #0a633e;
      color: white;
    }

    .pdf {
      background: #DC2626;
      color: white;
    }

    .deletebtn {
      background: #991B1B;
      color: white;
    }

    .darkbtn {
      background: #111827;
      color: white;
    }

    .iconbtn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .iconbtn:hover {
      background: var(--border);
    }

    .logoutbtn {
      color: #DC2626;
      background: #FEF2F2;
      border-color: #FCA5A5;
    }

    body.dark .logoutbtn {
      background: #7F1D1D;
      border-color: #991B1B;
      color: #FECACA;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #DDD6FE;
      cursor: pointer;
      font-weight: bold;
    }

    .tab.active {
      background: #aedd2e;
      color: #212844;
    }

    .section {
      display: none;
    }

    .section.show {
      display: block;
    }

    .statgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .stat h2 {
      color: var(--text);
    }

    .stat p {
      color: var(--text2);
    }

    .day {
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
      display: flex;
      justify-content: space-between;
    }

    .day:last-child {
      border: none;
    }

    .dayname {
      font-weight: bold;
      color: var(--text);
    }

    .dayinfo {
      color: var(--text2);
      font-size: 13px;
      margin-top: 2px;
    }

    .smallbtn {
      margin-top: 8px;
      background: #DC2626;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .success {
      background: #DCFCE7;
      color: #166534;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    /* Loading overlay */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(73, 124, 219, 0.993);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      display: none;
    }
    #loadingOverlay span {
      background: white;
      padding: 20px 30px;
      border-radius: 14px;
      font-weight: bold;
      color: #534AB7;
      font-size: 16px;
    }
    body.dark #loadingOverlay span {
      background: #24569c;
      color: #a5b4fc;
    }

    /* Sync status badge */
    #syncStatus {
      font-size: 12px;
      color: var(--text2);
      text-align: center;
      margin-top: 6px;
    }
    #syncStatus.synced { color: #16a34a; }
    #syncStatus.syncing { color: #d97706; }
    #syncStatus.error { color: #dc2626; }
  </style>
</head>

<body>

  <!-- Loading overlay -->
  <div id="loadingOverlay"><span>⏳ Cargando...</span></div>

  <div id="loginBox" class="container">

    <div class="card">

      <h2>Iniciar sesión</h2>

      <input type="email" id="email" placeholder="Correo">

      <input type="password" id="password" placeholder="Contraseña">

      <button class="btn primary" onclick="login()">
        Entrar
      </button>

      <button class="btn" onclick="registrar()">
        Crear cuenta
      </button>

    </div>

  </div>

  <div id="app" style="display:none">

    <div class="container">

      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px;">
        <div>
          <h1 style="margin-bottom:2px;">Checador SH</h1>
          <p class="sub" style="margin-bottom:0;">Registro semanal de trabajo</p>
          <div id="syncStatus">⏳ Iniciando...</div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="iconbtn" onclick="toggleDark()" title="Alternar Tema Oscuro"><img width="45" height="45" src="https://img.icons8.com/matisse/100/day-and-night.png" alt="day-and-night"/></button>
          <button class="iconbtn logoutbtn" onclick="logout()" title="Cerrar Sesión"><img width="50" height="50" src="https://img.icons8.com/ios-filled/50/logout-rounded-up.png" alt="logout-rounded-up"/></button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('registro',event)">Registrar</button>
        <button class="tab" onclick="showTab('semana',event)">Semana</button>
        <button class="tab" onclick="showTab('config',event)">Config</button>
      </div>

      <div class="section show" id="registro">

        <div class="card" id="modo-entrada">
          <h2 style="text-align:center; margin-bottom:15px; color:var(--text);">¡Bienvenido!</h2>
          <button class="btn primary" style="padding:20px; font-size:18px;" onclick="checarEntrada()">
           Registrar Entrada Ahora <img width="45" height="45" src="https://img.icons8.com/glyph-neue/64/checked-user-male.png" alt="checked-user-male"/> 
          </button>
        </div>

        <div class="card" id="modo-salida" style="display:none;">
          <h2 style="margin-bottom:15px; color:var(--text);">Completar Registro</h2>
          
          <input type="hidden" id="dia">
          <input type="hidden" id="fecha">

          <div class="row">
            <div>
              <label>Entrada (Fija)</label>
              <input type="time" id="entrada" disabled style="background:var(--bg); opacity:0.8;">
            </div>
            <div>
              <label>Salida</label>
              <input type="time" id="salida" value="">
            </div>
          </div>

          <label>Comida (minutos)</label>
          <input type="number" id="comida" value="0">

          <label>Préstamo</label>
          <input type="number" id="prestamo" value="0">

          <button class="btn whatsapp" style="background-color:#0a633e;" onclick="guardarDia()">
            🏁 Guardar Salida y Cerrar Día
          </button>
          
          <button class="btn" style="background:var(--bg); color:var(--text2); margin-top:10px;" onclick="cancelarSalida()">
            Cancelar
          </button>

          <div class="success" id="ok">
            Registro guardado ✅
          </div>
        </div>

      </div>

      <div class="section" id="semana">
        <div id="contenidoSemana"></div>
      </div>

      <div class="section" id="config">

        <div class="card">
          <label>Pago por hora</label>
          <input type="number" id="horaPago" value="60">
          <button class="btn primary" onclick="guardarConfig()" style="margin-top:12px;">
            💾 Guardar configuración
          </button>
        </div>

      </div>

    </div>

  </div>

  <!-- ===== FIREBASE AUTH MODULE ===== -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      deleteDoc,
      onSnapshot,
      getDoc,
      setDoc as fsSetDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBg3JLnLSiHH4vQqNRTdfl7TAXkGDxR6Ts",
      authDomain: "checador-sh.firebaseapp.com",
      projectId: "checador-sh",
      storageBucket: "checador-sh.appspot.com",
      messagingSenderId: "1074509664672",
      appId: "1:1074509664672:web:6248902b297aa7709754c5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let unsubscribeListener = null;

    // ---- Auth ----
    window.registrar = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Usuario creado");
      } catch (e) {
        alert(e.message);
      }
    };

    window.login = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        alert(e.message);
      }
    };

    window.logout = async () => {
      if (unsubscribeListener) unsubscribeListener();
      await signOut(auth);
    };

    // ---- Firestore helpers exposed globally ----

    // Guardar un registro en Firestore
    window.fsGuardarRegistro = async (uid, reg) => {
      setSyncStatus("syncing");
      try {
        const ref = doc(db, "usuarios", uid, "registros", reg.dia);
        await setDoc(ref, reg);
        setSyncStatus("synced");
        return true;
      } catch (e) {
        console.error("Error guardando:", e);
        setSyncStatus("error", e.message);
        return false;
      }
    };

    // Eliminar un registro
    window.fsEliminarRegistro = async (uid, dia) => {
      setSyncStatus("syncing");
      try {
        await deleteDoc(doc(db, "usuarios", uid, "registros", dia));
        setSyncStatus("synced");
      } catch (e) {
        setSyncStatus("error", e.message);
      }
    };

    // Borrar todos los registros
    window.fsBorrarTodo = async (uid, dias) => {
      setSyncStatus("syncing");
      try {
        await Promise.all(dias.map(dia =>
          deleteDoc(doc(db, "usuarios", uid, "registros", dia))
        ));
        setSyncStatus("synced");
      } catch (e) {
        setSyncStatus("error", e.message);
      }
    };

    // Guardar config (pagoHora)
    window.fsGuardarConfig = async (uid, pagoHora) => {
      try {
        await setDoc(doc(db, "usuarios", uid, "config", "general"), { pagoHora });
      } catch(e) { console.error(e); }
    };

    // ---- Auth state ----
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window._uid = user.uid;

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";

        // Cargar config
        try {
          const cfgDoc = await getDoc(doc(db, "usuarios", user.uid, "config", "general"));
          if (cfgDoc.exists()) {
            const cfg = cfgDoc.data();
            window._pagoHora = cfg.pagoHora || 60;
            document.getElementById("horaPago").value = window._pagoHora;
          }
        } catch(e) {}

        // Escuchar registros en tiempo real
        if (unsubscribeListener) unsubscribeListener();
        setSyncStatus("syncing");

        unsubscribeListener = onSnapshot(
          collection(db, "usuarios", user.uid, "registros"),
          (snapshot) => {
            window.registros = [];
            snapshot.forEach(docSnap => {
              window.registros.push(docSnap.data());
            });
            // Ordenar por fecha
            window.registros.sort((a, b) => a.fecha > b.fecha ? 1 : -1);
            setSyncStatus("synced");
            // Si la pestaña semana está visible, re-renderizar
            if (document.getElementById("semana").classList.contains("show")) {
              renderSemana();
            }
          },
          (error) => {
            setSyncStatus("error", "Sin conexión");
          }
        );

      } else {
        window._uid = null;
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("app").style.display = "none";
      }
    });

    function setSyncStatus(state, msg) {
      const el = document.getElementById("syncStatus");
      if (!el) return;
      el.className = "";
      if (state === "synced") {
        el.textContent = "☁️ Guardado en la nube";
        el.classList.add("synced");
      } else if (state === "syncing") {
        el.textContent = "⏳ Sincronizando...";
        el.classList.add("syncing");
      } else {
        el.textContent = "⚠️ Error: " + (msg || "Sin conexión");
        el.classList.add("error");
      }
    }

  </script>

  <!-- ===== APP LOGIC ===== -->
  <script>

    // registros se gestiona desde Firebase en tiempo real (window.registros)
    window.registros = [];
    window._pagoHora = 60;

    function getUID() { return window._uid; }

    function getPagoHora() {
      return parseFloat(document.getElementById("horaPago").value) || 60;
    }

    document.getElementById("fecha").value =
      new Date().toISOString().split('T')[0];

    if (localStorage.getItem("dark") === "true") {
      document.body.classList.add("dark");
    }

    function showTab(tab, e) {
      document.querySelectorAll(".tab")
        .forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".section")
        .forEach(s => s.classList.remove("show"));
      e.target.classList.add("active");
      document.getElementById(tab).classList.add("show");
      if (tab === "semana") {
        renderSemana();
      }
    }

    async function guardarDia() {
      const uid = getUID();
      if (!uid) { alert("No hay sesión activa"); return; }

      const dia = document.getElementById("dia").value;
      const fecha = document.getElementById("fecha").value;
      const entrada = document.getElementById("entrada").value;
      const salida = document.getElementById("salida").value;
      const comida = parseInt(document.getElementById("comida").value) || 0;
      const prestamo = parseFloat(document.getElementById("prestamo").value) || 0;

      let min = 0;
      if (entrada && salida) {
        const [eh, em] = entrada.split(":").map(Number);
        const [sh, sm] = salida.split(":").map(Number);
        min = ((sh * 60) + sm) - ((eh * 60) + em);
        min -= comida;
        if (min < 0) {
          alert("Horario inválido");
          return;
        }
      }

      const reg = { dia, fecha, entrada, salida, comida, prestamo, min };

      const ok = await window.fsGuardarRegistro(uid, reg);

      if (ok) {
        document.getElementById("ok").style.display = "block";
        setTimeout(() => {
          document.getElementById("ok").style.display = "none";
          document.getElementById("modo-salida").style.display = "none";
          document.getElementById("modo-entrada").style.display = "block";
          document.querySelectorAll(".tab")[1].click();
        }, 1000);
      }
    }

    function fmtHoras(min) {
      const h = Math.floor(min / 60);
      const m = min % 60;
      return `${h}h ${m}min`;
    }

    function renderSemana() {
      const pagoHora = getPagoHora();
      const registros = window.registros || [];

      let totalMin = 0;
      let totalPrestamo = 0;

      registros.forEach(r => {
        totalMin += r.min;
        totalPrestamo += r.prestamo;
      });

      const horas = totalMin / 60;
      const extras = Math.max(horas - 48, 0);
      const normales = Math.min(horas, 48);
      const total = (normales * pagoHora) + (extras * (pagoHora * 2));
      const neto = total - totalPrestamo;

      let html = `
      <div class="statgrid">
        <div class="stat"><h2>${fmtHoras(totalMin)}</h2><p>Horas</p></div>
        <div class="stat"><h2>${extras.toFixed(1)}h</h2><p>Extras</p></div>
        <div class="stat"><h2>$${Math.round(total)}</h2><p>Total</p></div>
        <div class="stat"><h2>$${Math.round(neto)}</h2><p>Neto</p></div>
      </div>
      <div class="card">
      `;

      if (registros.length === 0) {
        html += `<p style="color:var(--text2); text-align:center; padding:20px;">Sin registros esta semana</p>`;
      }

      registros.forEach(r => {
        const pago = Math.round((r.min / 60) * pagoHora);
        html += `
        <div class="day">
          <div>
            <div class="dayname">${r.dia}</div>
            <div class="dayinfo">📅 ${r.fecha}</div>
            <div class="dayinfo">${r.entrada || '--:--'} - ${r.salida || 'Pendiente'}</div>
            <div class="dayinfo">Trabajado: ${fmtHoras(r.min)}</div>
            <div class="dayinfo">Comida: ${r.comida}min</div>
          </div>
          <div style="text-align:right;">
            <div class="dayname" style="margin-bottom:5px;">$${pago}</div>
            ${!r.salida ? `
              <button class="smallbtn" style="background:#0a633e; margin-bottom:5px; display:block; width:100%;"
                onclick="prepararSalida('${r.dia}')">Registrar Salida</button>
            ` : ''}
            <button class="smallbtn" style="display:block; width:100%;"
              onclick="eliminarDia('${r.dia}')">Eliminar</button>
          </div>
        </div>`;
      });

      html += `</div>
        <button class="btn whatsapp" onclick="compartirWA()">Compartir WhatsApp</button>
        <button class="btn pdf" onclick="exportPDF()">Exportar PDF</button>
        <button class="btn deletebtn" onclick="borrarTodo()">Borrar Toda la Semana</button>
      `;

      document.getElementById("contenidoSemana").innerHTML = html;
    }

    function compartirWA() {
      const pagoHora = getPagoHora();
      const registros = window.registros || [];
      let totalMin = 0, totalPrestamo = 0, txt = '';
      txt += `*Registro semana*\n_Pago por hora: $${pagoHora}_\n\n`;
      registros.forEach(r => {
        totalMin += r.min;
        totalPrestamo += r.prestamo;
        const pago = Math.round((r.min / 60) * pagoHora);
        txt += `*${r.dia}* — ${r.entrada || '--:--'} a ${r.salida || 'Pendiente'}\n`;
        txt += `Fecha: ${r.fecha}\n`;
        txt += `Trabajado: ${fmtHoras(r.min)} → $${pago}\n`;
        txt += `Comida: ${r.comida}min\n\n---\n\n`;
      });
      const horas = totalMin / 60;
      const extras = Math.max(horas - 48, 0);
      const normales = Math.min(horas, 48);
      const total = (normales * pagoHora) + (extras * (pagoHora * 2));
      const neto = total - totalPrestamo;
      txt += `*Total horas:* ${fmtHoras(totalMin)}\n`;
      txt += `*Total a cobrar:* $${Math.round(total)}\n`;
      txt += `*Total prestado:* $${Math.round(totalPrestamo)}\n`;
      txt += `*Neto a recibir:* $${Math.round(neto)}`;
      window.open("https://wa.me/?text=" + encodeURIComponent(txt), "_blank");
    }

    async function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const registros = window.registros || [];
      let y = 20;
      doc.setFontSize(20);
      doc.text("Checador Pro", 20, y);
      y += 15;
      registros.forEach(r => {
        doc.setFontSize(12);
        doc.text(`${r.dia} ${r.fecha}`, 20, y);
        y += 7;
        doc.text(`${r.entrada || '--:--'} a ${r.salida || 'Pendiente'} ${fmtHoras(r.min)}`, 20, y);
        y += 12;
      });
      doc.save("registro.pdf");
    }

    function checarEntrada() {
      const now = new Date();
      const days = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
      document.getElementById("dia").value = days[now.getDay()];
      document.getElementById("fecha").value = now.toISOString().split('T')[0];
      const hs = String(now.getHours()).padStart(2, '0');
      const ms = String(now.getMinutes()).padStart(2, '0');
      document.getElementById("entrada").value = `${hs}:${ms}`;
      document.getElementById("salida").value = "";
      document.getElementById("comida").value = "0";
      document.getElementById("prestamo").value = "0";
      guardarDia();
    }

    function prepararSalida(diaStr) {
      const registros = window.registros || [];
      const reg = registros.find(r => r.dia === diaStr);
      if (!reg) return;
      document.getElementById("dia").value = reg.dia;
      document.getElementById("fecha").value = reg.fecha;
      document.getElementById("entrada").value = reg.entrada;
      document.getElementById("comida").value = reg.comida;
      document.getElementById("prestamo").value = reg.prestamo;
      const now = new Date();
      const hs = String(now.getHours()).padStart(2, '0');
      const ms = String(now.getMinutes()).padStart(2, '0');
      document.getElementById("salida").value = `${hs}:${ms}`;
      document.getElementById("modo-entrada").style.display = "none";
      document.getElementById("modo-salida").style.display = "block";
      document.querySelectorAll(".tab")[0].click();
    }

    function cancelarSalida() {
      document.getElementById("modo-entrada").style.display = "block";
      document.getElementById("modo-salida").style.display = "none";
      document.querySelectorAll(".tab")[1].click();
    }

    async function eliminarDia(dia) {
      const uid = getUID();
      if (!uid) return;
      await window.fsEliminarRegistro(uid, dia);
      renderSemana();
    }

    async function borrarTodo() {
      const uid = getUID();
      if (!uid) return;
      const dias = (window.registros || []).map(r => r.dia);
      await window.fsBorrarTodo(uid, dias);
      renderSemana();
    }

    async function guardarConfig() {
      const uid = getUID();
      const pagoHora = getPagoHora();
      window._pagoHora = pagoHora;
      if (uid) await window.fsGuardarConfig(uid, pagoHora);
      alert("Configuración guardada ✅");
    }

    function toggleDark() {
      document.body.classList.toggle("dark");
      localStorage.setItem("dark", document.body.classList.contains("dark"));
    }

  </script>

</body>

</html>
